<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Автобусы Алматы А-Б (Автообновление)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f5f5f7;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 400px;
            width: 100%;
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            box-sizing: border-box;
        }
        h2 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 5px;
            color: #1d1d1f;
            font-size: 22px;
        }
        .status {
            text-align: center;
            font-size: 11px;
            color: #86868b;
            margin-bottom: 25px;
            font-weight: bold;
        }
        label {
            font-weight: 600;
            display: block;
            margin-bottom: 8px;
            color: #515154;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 20px;
            border: 1px solid #d2d2d7;
            border-radius: 10px;
            font-size: 16px;
            background-color: #fafafa;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #007aff;
            background-color: #fff;
        }
        button {
            width: 100%;
            padding: 16px;
            background-color: #007aff;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        #result {
            margin-top: 25px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-size: 16px;
        }
        .bus-list {
            font-size: 32px;
            font-weight: 800;
            color: #007aff;
            margin-top: 10px;
            display: block;
            letter-spacing: 1px;
            line-height: 1.3;
        }
        .no-route {
            color: #ff3b30;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Транспорт Алматы</h2>
    <div id="sync-status" class="status">Синхронизация...</div>
    
    <label for="stopA">Остановка А (Откуда):</label>
    <input type="text" id="stopA" list="stops-list" placeholder="Начните вводить...">

    <label for="stopB">Остановка Б (Куда):</label>
    <input type="text" id="stopB" list="stops-list" placeholder="Начните вводить...">

    <datalist id="stops-list"></datalist>

    <button onclick="findBuses()">Найти автобусы</button>

    <div id="result"></div>
</div>

<script>
    // Наша подстраховка
    let transitData = {
        "Саяхат": ["12", "32", "73", "92", "118", "201"],
        "ЦУМ": ["32", "92", "201"]
    };

    // Прямой, официальный обходной адрес большой базы без блокировок
const routesUrl = 'https://fap627.github.io/almaty-bus/routes.json';
    async function loadLiveRoutes() {
        const statusDiv = document.getElementById("sync-status");
        try {
            // Добавляем случайное число к запросу, чтобы телефон не брал старое из памяти
            const response = await fetch(routesUrl + '?v=' + Math.random(), { cache: "no-store" });
            if (response.ok) {
                const remoteData = await response.json();
                if (Object.keys(remoteData).length > 0) {
                    transitData = remoteData;
                    statusDiv.innerText = "Данные обновлены в реальном времени";
                    statusDiv.style.color = "#34c759";
                }
            } else {
                statusDiv.innerText = "Режим автономии (локальная база)";
                statusDiv.style.color = "#ff9500";
            }
        } catch (e) {
            statusDiv.innerText = "Режим автономии (локальная база)";
            statusDiv.style.color = "#ff9500";
        }
        rebuildStops();
    }

    function rebuildStops() {
        const datalist = document.getElementById("stops-list");
        datalist.innerHTML = "";
        Object.keys(transitData).sort().forEach(stop => {
            const option = document.createElement("option");
            option.value = stop;
            datalist.appendChild(option);
        });
    }

    function findBuses() {
        const stopA = document.getElementById("stopA").value.trim();
        const stopB = document.getElementById("stopB").value.trim();
        const resultDiv = document.getElementById("result");

        if (!stopA || !stopB) {
            resultDiv.innerHTML = "<span class='no-route'>Заполните оба поля!</span>";
            return;
        }

        if (stopA === stopB) {
            resultDiv.innerHTML = "<span class='no-route'>Вы уже на этой остановке!</span>";
            return;
        }

        const busesA = Array.isArray(transitData[stopA]) ? transitData[stopA] : [];
        const busesB = Array.isArray(transitData[stopB]) ? transitData[stopB] : [];
        
        const directBuses = busesA.filter(bus => busesB.includes(bus));

        if (directBuses.length > 0) {
            const sortedBuses = directBuses.sort((a, b) => parseInt(a) - parseInt(b));
            resultDiv.innerHTML = `Прямые маршруты:<br><span class='bus-list'>${sortedBuses.join(', ')}</span>`;
        } else {
            resultDiv.innerHTML = "<span class='no-route'>Прямых автобусов нет.</span>";
        }
    }

    loadLiveRoutes();
</script>

</body>
</html>
